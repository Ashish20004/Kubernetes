apiVersion: v1
kind: Pod 
metadata:
  name: resources-demo
  labels:
    app: resources-demo
    details: demo
spec:
  containers:
    - name: nginx
      image: nginx
      resources:
        requests:
          memory: "64mi"
          cpu: "100m"
        limits:
          memory: "128mi"
          cpu: "150m"
